# No top-level `version:` key — this follows the Compose Specification, not the old
# versioned schema. See docs/adr/008-docker-compose-backend.md.
#
# Default `docker compose up` runs the server against SQLite inside the container
# (matches "SQLite dev" — docs/adr/005-sqlite-dev-postgres-deploy.md). Add the
# postgres profile to exercise the Postgres-deploy path locally:
#   docker compose --profile postgres up

services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "${PORT:-5000}:5000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///penguin_dash_server.db}
      SYNC_SECRET: ${SYNC_SECRET:-dev-secret-change-me}
      PORT: "5000"
      RATE_LIMIT: ${RATE_LIMIT:-60 per minute}
      # compose นี้เป็น dev tooling — เปิด debug ไว้เป็น default เพื่อให้รันได้ทันที
      # กับ SYNC_SECRET default (load_config ปฏิเสธ default secret เมื่อ debug ปิด)
      # deploy จริงต้องตั้งทั้ง FLASK_DEBUG=0 และ SYNC_SECRET จริงเสมอ
      FLASK_DEBUG: ${FLASK_DEBUG:-1}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
        required: false

  postgres:
    image: postgres:16.4
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: penguin
      POSTGRES_PASSWORD: penguin
      POSTGRES_DB: penguin_dash
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U penguin -d penguin_dash"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:

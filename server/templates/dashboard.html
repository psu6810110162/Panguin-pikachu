<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <title>Penguin Dash — Teacher Dashboard ({{ room_code }})</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; }
    table { border-collapse: collapse; width: 100%; max-width: 800px; }
    th, td { border: 1px solid #ccc; padding: 0.5rem 0.75rem; text-align: left; }
    th { background: #f0f0f0; }
    .status-ACTIVE { color: #1a7f37; }
    .status-RESPAWNING { color: #b8860b; }
    .status-FINISHED { color: #555; }
    button { padding: 0.5rem 1rem; margin-right: 0.5rem; }
  </style>
</head>
<body>
  <h1>Room: {{ room_code }}</h1>

  <table id="leaderboard">
    <thead>
      <tr>
        <th>Player</th>
        <th>Distance (m)</th>
        <th>Respawns</th>
        <th>Environmental Score</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      {% for row in leaderboard %}
      <tr>
        <td>{{ row.player_name }}</td>
        <td>{{ row.distance_m }}</td>
        <td>{{ row.respawn_count }}</td>
        <td>{{ row.environmental_score }}</td>
        <td class="status-{{ row.status }}">{{ row.status }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>

  <p>
    <button id="end-session">End Session</button>
    <button id="export-csv" type="button">Export CSV</button>
  </p>

  <script>
    const roomCode = "{{ room_code }}";
    const teacherToken = "{{ teacher_token }}";

    // token เข้ามาทาง ?token= ครั้งเดียวตอนเปิดหน้า — ลบออกจาก URL ทันที ไม่ให้ค้าง
    // ใน browser history/ลิงก์ที่ copy ไปแชร์ ทุก request หลังจากนี้ใช้ header แทน
    const cleanUrl = new URL(window.location.href);
    if (cleanUrl.searchParams.has("token")) {
      cleanUrl.searchParams.delete("token");
      history.replaceState(null, "", cleanUrl);
    }

    const socket = io();

    socket.on("connect", () => {
      socket.emit("join_dashboard", { room_code: roomCode });
    });

    socket.on("leaderboard_update", (rows) => {
      const tbody = document.querySelector("#leaderboard tbody");
      tbody.innerHTML = "";
      for (const row of rows) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${row.player_name}</td>
          <td>${row.distance_m}</td>
          <td>${row.respawn_count}</td>
          <td>${row.environmental_score}</td>
          <td class="status-${row.status}">${row.status}</td>
        `;
        tbody.appendChild(tr);
      }
    });

    document.getElementById("end-session").addEventListener("click", async () => {
      await fetch(`/api/sessions/${roomCode}/end`, {
        method: "POST",
        headers: { "X-Teacher-Token": teacherToken },
      });
    });

    // Export ผ่าน fetch + blob แทนลิงก์ตรง เพื่อส่ง token ทาง header ได้ (ไม่ติด URL)
    document.getElementById("export-csv").addEventListener("click", async () => {
      const response = await fetch(`/dashboard/${roomCode}/export.csv`, {
        headers: { "X-Teacher-Token": teacherToken },
      });
      if (!response.ok) return;
      const blob = await response.blob();
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `${roomCode}-report.csv`;
      link.click();
      URL.revokeObjectURL(link.href);
    });
  </script>
</body>
</html>

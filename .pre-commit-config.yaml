repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1500"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.5
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pytest
        name: pytest (pre-push)
        entry: env KIVY_NO_ARGS=1 KIVY_WINDOW=mock pytest -q
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: mypy
        name: mypy core/ (pre-push)
        entry: mypy
        language: system
        pass_filenames: false
        stages: [pre-push]
